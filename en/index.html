
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Never Landing · A Fable</title>
<style>
  :root{
    --ink-green: #2B3A2C;
    --ink-green-deep: #1B2620;
    --parchment: #EFE6CC;
    --parchment-edge: #DCCBA0;
    --bark: #6B4F3B;
    --bark-soft: #8a6c52;
    --moss: #7E9A63;
    --slate: #51707a;
    --ochre: #C97A3D;
    --ink-text: #2B2018;
    --font-display: "EB Garamond", "Palatino Linotype", Georgia, serif;
    --font-body: "EB Garamond", Georgia, "Times New Roman", serif;
    --font-utility: "Libre Baskerville", "Georgia", serif;
    --font-roman: "EB Garamond", Georgia, serif;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(ellipse at 50% -10%, #34452f 0%, var(--ink-green) 45%, var(--ink-green-deep) 100%);
    color: var(--ink-text);
    font-family: var(--font-body);
    overflow-x:hidden;
  }

  .canopy-bg{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .canopy-bg svg{ position:absolute; opacity:.16; }
  .leaf-a{ top:-60px; left:-80px; width:420px; transform-origin: 20% 0%; animation: sway 9s ease-in-out infinite; }
  .leaf-b{ top:-40px; right:-100px; width:480px; transform-origin: 80% 0%; animation: sway 11s ease-in-out infinite reverse; }
  .leaf-c{ bottom:-80px; left:30%; width:380px; transform-origin: 50% 100%; animation: sway 13s ease-in-out infinite; }
  @keyframes sway{
    0%,100%{ transform: rotate(-1.4deg); }
    50%{ transform: rotate(1.4deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .leaf-a,.leaf-b,.leaf-c{ animation: none; }
  }

  .stage{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 40px 18px 60px;
  }

  .book{ width:100%; max-width:640px; }

  .page{
    background: var(--parchment);
    border: 1px solid var(--parchment-edge);
    box-shadow: 0 1px 0 var(--parchment-edge) inset, 0 24px 60px -20px rgba(0,0,0,.55);
    padding: 38px 40px 34px;
    position:relative;
  }
  .page::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:5px;
    background: linear-gradient(90deg, var(--bark) 0%, var(--bark-soft) 50%, var(--bark) 100%);
  }
  @media (max-width: 540px){ .page{ padding: 28px 22px 26px; } }

  .eyebrow{
    display:flex; align-items:baseline; gap:10px;
    font-family: var(--font-utility);
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--bark);
    margin-bottom: 4px;
  }
  .eyebrow .roman{
    font-family: var(--font-roman);
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ochre);
  }
  .eyebrow .twig-rule{ flex:1; height:1px; background: var(--parchment-edge); position:relative; top:1px; }

  h1.title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(22px, 5vw, 30px);
    margin: 6px 0 18px;
    color: var(--ink-text);
    letter-spacing: .01em;
  }

  .stats{
    display:flex; flex-direction:column; gap:6px;
    margin: 6px 0 26px;
    padding: 14px 16px;
    background: rgba(255,255,255,.18);
    border: 1px solid var(--parchment-edge);
  }
  .stat-row{ display:flex; align-items:center; gap:10px; }
  .stat-label{
    font-family: var(--font-utility);
    font-size: 10.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    width: 62px;
    flex-shrink:0;
  }
  .stat-label.freedom{ color: var(--moss); }
  .stat-label.wisdom{ color: var(--slate); }
  .stat-label.bond{ color: var(--ochre); }
  .leaf-track{ display:flex; gap:4px; }
  .leaf-icon{ width:13px; height:13px; flex-shrink:0; transition: transform .25s ease; }
  .leaf-icon.pulse{ animation: leafPop .5s ease; }
  @keyframes leafPop{ 0%{ transform: scale(.4); } 60%{ transform: scale(1.25); } 100%{ transform: scale(1); } }

  .story{
    font-size: 17px;
    line-height: 1.9;
    color: var(--ink-text);
  }
  .story p{ margin: 0 0 1em; }
  .story p:first-of-type::first-letter{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.6em;
    line-height: .78;
    float:left;
    padding: 4px 8px 0 0;
    color: var(--bark);
  }
  .reaction{
    font-style: italic;
    color: var(--bark);
    border-left: 2px solid var(--parchment-edge);
    padding-left: 12px;
    margin: 18px 0 0;
    font-size: 15.5px;
  }

  .choices{ list-style:none; margin: 26px 0 0; padding:0; display:flex; flex-direction:column; gap:2px; }
  .choice-btn{
    width:100%; text-align:left;
    display:flex; align-items:center; gap:12px;
    background:none; border:none; border-top: 1px solid var(--parchment-edge);
    font-family: var(--font-body); font-size: 15.5px; color: var(--ink-text);
    padding: 13px 4px; cursor:pointer; min-height:44px;
    transition: color .2s ease, padding-left .2s ease;
  }
  .choices li:last-child .choice-btn{ border-bottom: 1px solid var(--parchment-edge); }
  .choice-twig{ position:relative; width:20px; height:14px; flex-shrink:0; }
  .choice-twig::before{
    content:""; position:absolute; left:0; top:7px; width:14px; height:2px;
    background: var(--bark); transform: rotate(-18deg); transform-origin:left center;
    transition: background .2s ease;
  }
  .choice-twig svg{ position:absolute; right:-1px; top:-1px; width:13px; height:13px; transition: transform .2s ease; }
  .choice-twig svg path{ fill: var(--bark-soft); transition: fill .2s ease; }
  .choice-btn:hover, .choice-btn:focus-visible{
    color: var(--ochre); padding-left: 9px; outline: none;
  }
  .choice-btn:hover .choice-twig::before, .choice-btn:focus-visible .choice-twig::before{ background: var(--ochre); }
  .choice-btn:hover .choice-twig svg, .choice-btn:focus-visible .choice-twig svg{ transform: scale(1.25) rotate(8deg); }
  .choice-btn:hover .choice-twig svg path, .choice-btn:focus-visible .choice-twig svg path{ fill: var(--ochre); }
  .choice-btn:focus-visible{ box-shadow: inset 0 0 0 1px var(--ochre); }

  .continue-row{ margin-top: 28px; display:flex; justify-content:flex-end; }
  .btn-continue, .btn-start, .btn-restart{
    font-family: var(--font-utility);
    font-size: 12px; letter-spacing:.12em; text-transform: uppercase;
    background: var(--bark); color: var(--parchment);
    border:none; padding: 11px 22px; cursor:pointer;
    transition: background .2s ease, transform .15s ease;
  }
  .btn-continue:hover, .btn-start:hover, .btn-restart:hover{ background: var(--ink-green-deep); }
  .btn-continue:active, .btn-start:active, .btn-restart:active{ transform: translateY(1px); }
  .btn-continue:focus-visible, .btn-start:focus-visible, .btn-restart:focus-visible{
    outline: 2px dashed var(--ochre); outline-offset: 2px;
  }

  .cover{ text-align:center; padding: 18px 6px 4px; }
  .cover .kicker{
    font-family: var(--font-utility); font-size: 10.5px; letter-spacing:.24em;
    text-transform: uppercase; color: var(--bark); margin-bottom: 14px;
  }
  .cover h1{
    font-size: clamp(28px, 7vw, 42px); margin: 0 0 16px; font-family: var(--font-display); font-weight:700;
    letter-spacing: .01em;
  }
  .cover .lede{
    font-size: 16px; line-height:1.85; color: var(--ink-text); max-width: 440px; margin: 0 auto 26px;
    font-style: italic;
  }
  .cover .credit{
    font-family: var(--font-utility); font-size: 11px; color: var(--bark-soft);
    letter-spacing:.04em; margin-top: 26px;
  }
  .cover-divider{ width:48px; height:1px; background: var(--bark-soft); margin: 0 auto 26px; }

  .ending-tag{
    font-family: var(--font-utility); font-size: 11px; letter-spacing:.18em; text-transform: uppercase;
    color: var(--ochre); margin-bottom: 6px;
  }
  .ending-stats{
    margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--parchment-edge);
    font-family: var(--font-utility); font-size: 11.5px; color: var(--bark);
    letter-spacing:.06em; text-transform: uppercase;
  }

  .scene-anim{ animation: enterScene .5s ease; }
  @keyframes enterScene{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){ .scene-anim{ animation: none; } }

  .footer-note{
    text-align:center; margin-top: 22px; font-family: var(--font-utility);
    font-size: 11px; letter-spacing:.08em; color: rgba(239,230,204,.4);
    font-style: italic;
  }

  /* ---------- language switcher ---------- */
  .lang-switch{
    position:fixed; top:16px; right:18px; z-index:10;
    display:flex; gap:1px;
  }
  .lang-btn{
    font-family: var(--font-utility); font-size:11px; letter-spacing:.1em;
    padding: 6px 11px; text-decoration:none; cursor:pointer;
    background: rgba(239,230,204,.1); border:1px solid rgba(239,230,204,.25);
    color: rgba(239,230,204,.55); transition: background .2s, color .2s, border-color .2s;
  }
  .lang-btn:hover{ background: rgba(239,230,204,.2); color: rgba(239,230,204,.9); border-color: rgba(239,230,204,.45); }
  .lang-btn.active{ background: rgba(239,230,204,.18); color: rgba(239,230,204,.95); border-color: rgba(239,230,204,.5); font-weight:600; cursor:default; }
</style>
</head>
<body>

<nav class="lang-switch" aria-label="Language">
  <a class="lang-btn" href="../">中文</a>
  <span class="lang-btn active" aria-current="true">EN</span>
</nav>

<div class="canopy-bg" aria-hidden="true">
  <svg class="leaf-a" viewBox="0 0 200 160"><path d="M10 0C60 10 140 30 170 90C190 130 150 160 100 150C50 140 10 100 0 60C-6 35 -10 5 10 0Z" fill="#000"/></svg>
  <svg class="leaf-b" viewBox="0 0 220 170"><path d="M210 0C150 20 60 30 25 90C0 135 50 165 110 150C165 137 205 95 215 55C222 30 225 5 210 0Z" fill="#000"/></svg>
  <svg class="leaf-c" viewBox="0 0 200 150"><path d="M100 150C60 130 0 100 5 55C9 20 60 -5 110 5C160 15 190 50 185 85C180 120 140 145 100 150Z" fill="#000"/></svg>
</div>

<div class="stage">
  <div class="book">
    <div id="sceneRoot"></div>
    <div class="footer-note">A fable about freedom and belonging</div>
  </div>
</div>

<script>
(function(){

  var stats = { freedom: 0, wisdom: 0, bond: 0 };

  function leafIconColored(filled, cls, pulse){
    var color = filled
      ? 'var(--'+(cls==='freedom'?'moss':cls==='wisdom'?'slate':'ochre')+')'
      : 'rgba(43,32,24,.14)';
    return '<svg class="leaf-icon'+(pulse?' pulse':'')+'" viewBox="0 0 24 24">' +
      '<path d="M12 2C7 6 3 11 3 15.5C3 20 7 23 12 23C17 23 21 20 21 15.5C21 11 17 6 12 2Z" fill="'+color+'"/></svg>';
  }

  function statRow(label, cls, value, changedKey){
    var leaves = '';
    var filledCount = Math.min(6, Math.round(value/2));
    for(var i=0;i<6;i++){
      leaves += leafIconColored(i < filledCount, cls, changedKey===cls && i===filledCount-1);
    }
    return '<div class="stat-row"><span class="stat-label '+cls+'">'+label+'</span><span class="leaf-track">'+leaves+'</span></div>';
  }

  function renderStats(changedKey){
    return '<div class="stats">' +
      statRow('Freedom','freedom', stats.freedom, changedKey) +
      statRow('Wisdom','wisdom', stats.wisdom, changedKey) +
      statRow('Bond','bond', stats.bond, changedKey) +
      '</div>';
  }

  function choiceTwigSVG(){
    return '<span class="choice-twig"><svg viewBox="0 0 24 24"><path d="M12 2C7 6 3 11 3 15.5C3 20 7 23 12 23C17 23 21 20 21 15.5C21 11 17 6 12 2Z"/></svg></span>';
  }

  var S = {};

  // ---- cover ----
  S.cover = {
    render: function(){
      return '<div class="page scene-anim cover">' +
        '<div class="kicker">An Interactive Fable</div>' +
        '<h1>Never Landing</h1>' +
        '<div class="cover-divider"></div>' +
        '<p class="lede">At eleven years old, you climbed the old coral tree in the courtyard and made a vow: your feet would never touch the ground again. No one knew what kind of life that decision would grow into.</p>' +
        '<button class="btn-start" id="startBtn">Climb up</button>' +
        '<div class="credit">Inspired by Italo Calvino\'s <em>The Baron in the Trees</em> &nbsp;·&nbsp; All characters and story are original</div>' +
        '</div>';
    },
    bind: function(){ document.getElementById('startBtn').onclick = function(){ goto('ch1_intro'); }; }
  };

  function textScene(opts){
    return {
      render: function(changedKey){
        var eyebrow = opts.chapter
          ? '<div class="eyebrow"><span>'+opts.chapter+'</span><span class="roman">'+opts.roman+'</span><span class="twig-rule"></span></div>' : '';
        var title = opts.title ? '<h1 class="title">'+opts.title+'</h1>' : '';
        var statsHtml = opts.showStats ? renderStats(changedKey) : '';
        var body = '<div class="story">' + opts.paras.map(function(p){ return '<p>'+p+'</p>'; }).join('') + '</div>';
        return '<div class="page scene-anim">' + eyebrow + title + statsHtml + body +
          '<div class="continue-row"><button class="btn-continue" id="contBtn">Continue</button></div></div>';
      },
      bind: function(){ document.getElementById('contBtn').onclick = function(){ goto(opts.next); }; }
    };
  }

  function choiceScene(opts){
    return {
      render: function(changedKey){
        var eyebrow = opts.chapter
          ? '<div class="eyebrow"><span>'+opts.chapter+'</span><span class="roman">'+opts.roman+'</span><span class="twig-rule"></span></div>' : '';
        var title = opts.title ? '<h1 class="title">'+opts.title+'</h1>' : '';
        var statsHtml = opts.showStats ? renderStats(changedKey) : '';
        var body = '<div class="story">' + opts.paras.map(function(p){ return '<p>'+p+'</p>'; }).join('') + '</div>';
        var items = opts.options.map(function(o,i){
          return '<li><button class="choice-btn" data-i="'+i+'">'+choiceTwigSVG()+'<span>'+o.label+'</span></button></li>';
        }).join('');
        return '<div class="page scene-anim">' + eyebrow + title + statsHtml + body +
          '<ul class="choices">' + items + '</ul></div>';
      },
      bind: function(){
        document.querySelectorAll('.choice-btn').forEach(function(btn){
          btn.onclick = function(){
            var o = opts.options[parseInt(btn.getAttribute('data-i'),10)];
            if(o.special){ goto(o.special); return; }
            if(o.stat){ stats[o.stat] += o.delta; }
            showReaction(opts, o);
          };
        });
      }
    };
  }

  function showReaction(opts, o){
    var eyebrow = opts.chapter
      ? '<div class="eyebrow"><span>'+opts.chapter+'</span><span class="roman">'+opts.roman+'</span><span class="twig-rule"></span></div>' : '';
    var title = opts.title ? '<h1 class="title">'+opts.title+'</h1>' : '';
    var statsHtml = opts.showStats ? renderStats(o.stat) : '';
    var body = '<div class="story">' + opts.paras.map(function(p){ return '<p>'+p+'</p>'; }).join('') + '</div>';
    document.getElementById('sceneRoot').innerHTML =
      '<div class="page scene-anim">' + eyebrow + title + statsHtml + body +
      '<p class="reaction">'+o.reaction+'</p>' +
      '<div class="continue-row"><button class="btn-continue" id="contBtn2">Continue</button></div></div>';
    document.getElementById('contBtn2').onclick = function(){ goto(o.next); };
  }

  function endingScene(key, eyebrowTag, title, paras){
    return {
      render: function(){
        var body = '<div class="story">' + paras.map(function(p){ return '<p>'+p+'</p>'; }).join('') + '</div>';
        var summary = '<div class="ending-stats">Freedom &nbsp;'+stats.freedom+'&ensp;·&ensp; Wisdom &nbsp;'+stats.wisdom+'&ensp;·&ensp; Bond &nbsp;'+stats.bond+'</div>';
        return '<div class="page scene-anim">' +
          '<div class="ending-tag">Ending &nbsp;·&nbsp; '+eyebrowTag+'</div>' +
          '<h1 class="title">'+title+'</h1>' +
          body + summary +
          '<div class="continue-row"><button class="btn-restart" id="restartBtn">Climb again</button></div></div>';
      },
      bind: function(){
        document.getElementById('restartBtn').onclick = function(){
          stats = { freedom:0, wisdom:0, bond:0 };
          goto('cover');
        };
      }
    };
  }

  // ==============================
  // CHAPTER 1 · THE VOW
  // ==============================

  S.ch1_intro = textScene({
    chapter:'Book I', roman:'The Vow', title:'The Vow',
    paras:[
      'The summer you turned eleven, the air in Haiting smelled of pickled olives and the salt of ships just returned. Your father — the most respectable freight merchant in town — slid a plate of steamed snails across the dinner table for the third time. This was his idea of the right food. Part of his idea of the right life.',
      'You slid it back. A chair hit the floor with a sound that rang through the house. You ran out the door and climbed the old coral tree in the courtyard. You never thought that climb would last a lifetime.'
    ],
    next:'ch1_choiceA'
  });

  S.ch1_choiceA = choiceScene({
    chapter:'Book I', roman:'The Vow', title:'The Vow',
    paras:['Night crept up through the branches. You sat on the first limb wide enough to hold you and, for the first time, asked yourself honestly: what did you actually want, in that moment?'],
    options:[
      { label:'The bark is rough — but the wind is free.',
        stat:'freedom', delta:2,
        reaction:'You leaned back against the trunk. For the first time you felt it: looking down was dizzier than looking up. The dizziness was the rules.',
        next:'ch1_bridge' },
      { label:'You wanted to see what the world looks like from a place no one can reach you.',
        stat:'wisdom', delta:2,
        reaction:'You counted the veins of a single leaf, as though cataloguing the chapters of a book that hadn\'t been written yet.',
        next:'ch1_bridge' },
      { label:'You wanted to see who would look up when you disappeared.',
        stat:'bond', delta:2,
        reaction:'You heard your mother calling your name from below. There was a seriousness in her voice you had never heard before.',
        next:'ch1_bridge' }
    ]
  });

  S.ch1_bridge = textScene({
    chapter:'Book I', roman:'The Vow',
    paras:['The first night was cold. The townspeople confirmed you hadn\'t entirely lost your mind, each in their own way — someone left a blanket at the base of the tree; others simply watched from a distance and said nothing.'],
    next:'ch1_choiceB'
  });

  S.ch1_choiceB = choiceScene({
    chapter:'Book I', roman:'The Vow', title:'The Vow',
    paras:['You had to decide how to spend the nights ahead.'],
    options:[
      { label:'Rig a hammock. Make the tree your room.',
        stat:'freedom', delta:2,
        reaction:'You built your first bed from rope and old canvas. Swaying in it, you slept more soundly than you ever had in the house.',
        next:'ch2_intro' },
      { label:'Have someone lend you a thick book to get through the dark.',
        stat:'wisdom', delta:2,
        reaction:'The boy who brought it said nobody in town could work out what you were doing up there — but everyone wanted to know how it ended.',
        next:'ch2_intro' },
      { label:'Arrange three whistle signals with your sister, to stay in touch.',
        stat:'bond', delta:2,
        reaction:'Safe. Need something. And a third — meaning: don\'t let Father know.',
        next:'ch2_intro' }
    ]
  });

  // ==============================
  // CHAPTER 2 · CANOPY ENGINEERING
  // ==============================

  S.ch2_intro = textScene({
    chapter:'Book II', roman:'Canopy Engineering', title:'Canopy Engineering',
    paras:[
      'The days passed. One tree was not enough. You began stringing rope bridges between the oaks and fig trees, turning the grove at the edge of town into a country only you knew how to navigate.',
      'The townspeople split into two camps: those who said you\'d lost your mind, and those who started tiptoeing beneath the canopy to borrow things from you.'
    ],
    next:'ch2_choiceA'
  });

  S.ch2_choiceA = choiceScene({
    chapter:'Book II', roman:'Canopy Engineering', title:'Canopy Engineering',
    paras:['How did you want to build?'],
    options:[
      { label:'Fast and wide — claim the whole grove.',
        stat:'freedom', delta:2,
        reaction:'Your territory grew day by day until no one could say how many paths ran through the grove\'s edge.',
        next:'ch2_bridge' },
      { label:'Draw each span first, calculate the load, never go back to fix mistakes.',
        stat:'wisdom', delta:2,
        reaction:'You started carrying a notebook, recording which knots held best through the wet season.',
        next:'ch2_bridge' },
      { label:'Only where the chimneys of town are still visible.',
        stat:'bond', delta:2,
        reaction:'Every dusk you counted the lights coming on, tracking who had not yet lit their fire.',
        next:'ch2_bridge' }
    ]
  });

  S.ch2_bridge = textScene({
    chapter:'Book II', roman:'Canopy Engineering',
    paras:['One rainy morning, the blacksmith craned his neck to look up at you, slipped from his ladder, and landed hard on the stone steps of his own front door.'],
    next:'ch2_choiceB'
  });

  S.ch2_choiceB = choiceScene({
    chapter:'Book II', roman:'Canopy Engineering', title:'Canopy Engineering',
    paras:['He shouted something from below. You couldn\'t tell if it was a curse or a call.'],
    options:[
      { label:'"Ladders are for people who live on the ground." You got back to work.',
        stat:'freedom', delta:2,
        reaction:'He never sought you out for conversation again — but he stopped calling you mad. He said you were proof there was another way to live.',
        next:'ch3_intro' },
      { label:'You stayed up all night designing a pulley system for passing things without coming down.',
        stat:'wisdom', delta:2,
        reaction:'Three days later, four households in town had quietly installed the same hook under their own eaves.',
        next:'ch3_intro' },
      { label:'You slid halfway down the rope and reached out a hand.',
        stat:'bond', delta:2,
        reaction:'Your feet never touched the earth. But that was the closest you had ever come to landing.',
        next:'ch3_intro' }
    ]
  });

  // ==============================
  // CHAPTER 3 · THOUGHT & LOVE
  // ==============================

  S.ch3_intro = textScene({
    chapter:'Book III', roman:'Thought & Love', title:'Thought & Love',
    paras:[
      'In your third year, an old man with a specimen case and a self-given title — "a watcher of trees" — pitched a tent at the grove\'s edge. He called himself Elder Hua. He said he had once tried to never land himself, but hadn\'t lasted a winter. Each week he passed you a new book. Through him, you first learned that people had been arguing for centuries about the right way to live.',
      'That same year, Ling — the librarian\'s daughter — began climbing the wall to bring you pages she\'d copied out by hand, because her father wouldn\'t allow her to lend you the "dangerous books" himself.'
    ],
    next:'ch3_choiceA'
  });

  S.ch3_choiceA = choiceScene({
    chapter:'Book III', roman:'Thought & Love', title:'Thought & Love',
    paras:['Faced with the centuries-old arguments Elder Hua kept bringing you — which one actually mattered?'],
    options:[
      { label:'How to last longer up here. How to live more steadily.',
        stat:'freedom', delta:2,
        reaction:'You told Elder Hua the theory could wait. You had a roof to patch before the rains came.',
        next:'ch3_choiceB' },
      { label:'Use the canopy as a desk above the world — start writing letters.',
        stat:'wisdom', delta:2,
        reaction:'Your first letter went to a scholar in a distant city you had never met.',
        next:'ch3_choiceB' },
      { label:'You cared more about the stories Ling brought than any philosophy Elder Hua carried.',
        stat:'bond', delta:2,
        reaction:'You found yourself listening for the sound of her crossing the wall more than for the lamp in his tent that always burned late.',
        next:'ch3_choiceB' }
    ]
  });

  S.ch3_choiceB = choiceScene({
    chapter:'Book III', roman:'Thought & Love', title:'Thought & Love',
    paras:['And Ling — what were you going to do about that?'],
    options:[
      { label:'Keep your distance. Afraid of owing someone a reason to come down.',
        stat:'freedom', delta:2,
        reaction:'Every feeling you noticed, you quietly filed under: be more careful.',
        next:'ch4_intro' },
      { label:'Carve arguments about what freedom really means into the bark, together.',
        stat:'wisdom', delta:2,
        reaction:'The tree\'s bark slowly filled with the handwriting of two people — like a contract no one else could read.',
        next:'ch4_intro' },
      { label:'Build the most solid bridge in the whole grove, going only to her rooftop.',
        stat:'bond', delta:2,
        reaction:'She said it was the clumsiest, most earnest "I like you" she had ever seen.',
        next:'ch4_intro' }
    ]
  });

  // ==============================
  // CHAPTER 4 · THE FIRE
  // ==============================

  S.ch4_intro = textScene({
    chapter:'Book IV', roman:'The Fire', title:'The Fire',
    paras:[
      'The winter you turned thirty, a fire broke out at the grove\'s edge — no one could say whether it was lightning or a neighbour\'s brazier. The town\'s wells weren\'t enough. Your father\'s freight warehouse was the first to catch. Ling\'s father ran in to rescue the ledgers and was trapped by smoke in the attic.',
      'People across the whole grove were calling your name. For the first time in nineteen years, someone genuinely needed you to answer: would you — for any one person — put your feet back on the ground?'
    ],
    next:'ch4_choice'
  });

  S.ch4_choice = choiceScene({
    chapter:'Book IV', roman:'The Fire', title:'The Fire',
    paras:['The firelight lit the earth beneath you — ground you hadn\'t touched in nineteen years.'],
    options:[
      { label:'Step down. Run into the fire.',
        special:'ending_ground' },
      { label:'You hold yourself in the air. You don\'t jump. You start looking for another way.',
        next:'ch4_climb' }
    ]
  });

  S.ch4_climb = textScene({
    chapter:'Book IV', roman:'The Fire',
    paras:['Everything you had learned across nineteen years came to you at once — knots, load-bearing, and the one person who had always been waiting for an answer. You knew. The answer had been writing itself slowly across all of those years.'],
    next:'__compute_ending__'
  });

  // ==============================
  // ENDINGS
  // ==============================

  S.ending_freedom = endingScene('freedom', 'Evergreen', 'The Man Who Became a Moving Tree', [
    'You didn\'t reach for any rooftop. Instead you turned nineteen years of balance and memory into a map only you could read — directing the townspeople through smoke, threading bucket after bucket through your pulley network into the fire, your feet never touching a single inch of earth.',
    'By the morning the fire was out, the townspeople had stopped asking when you were coming down. They started writing you into books as someone who had truly, fully lived.',
    'Years later, one autumn, you walked a newly-strung rope bridge into the deep of the grove and kept walking. No one ever saw you come back. They say you finally turned yourself into a tree that moved.'
  ]);

  S.ending_wisdom = endingScene('wisdom', 'Letters', 'A Centre That Stands on No Ground', [
    'In the fire, you didn\'t think about escape — you thought about structure. Using what Elder Hua had taught you, you calculated in ten minutes which section of the warehouse roof would collapse first, and called out the only correct evacuation route. Nobody was hurt.',
    'After the fire, you began turning all those years of fumbling with "how to live without landing" into letters sent to universities far away. You never received a title.',
    'But years later, strangers would mention in footnotes "the correspondent in the trees of Haiting" — you spent a life proving that a person can stand nowhere on the ground, and still stand at the centre of the world.'
  ]);

  S.ending_bond = endingScene('bond', 'Bridges', 'Closer Than Anyone Else', [
    'The first thing you thought of wasn\'t data or an evacuation route — it was Ling. You ran the bridge as fast as the ropes would carry you — the only one that led to her rooftop — and pulled her and her father\'s ledgers from the attic. Your feet never touched the ground.',
    'The fire took half the warehouse, but burned away the last of the distance between you and the town. In the years that followed you built more and more bridges, until they connected half the rooftops in Haiting.',
    'Children stopped saying "the strange man in the trees" and started saying "go find him at the bridge." You never landed once. And yet you lived closer to other people than anyone else in town.'
  ]);

  S.ending_ground = endingScene('ground', 'The Day I Decided', 'On My Own Terms', [
    'You didn\'t stop to think. You stepped down — the first time in nineteen years. The ground was hard and warm with fire, carrying a weight you had never felt before: the weight of belonging to others.',
    'You ran in and dragged Ling\'s father out. A falling beam caught your foot. When it healed, you could have gone back to the tree. You didn\'t — not because you had lost, but because you finally understood: the vow had never been about never coming down. It had been about deciding for yourself when you did.',
    'The townspeople rarely mentioned your nineteen years after that. But Ling remembered. She said the look on your face when you stepped down was the freest you had ever seemed.'
  ]);

  function computeEnding(){
    var order = ['bond','wisdom','freedom'];
    var best = order[0];
    order.forEach(function(k){ if(stats[k] > stats[best]) best = k; });
    return 'ending_' + best;
  }

  function goto(id){
    if(id === '__compute_ending__'){ id = computeEnding(); }
    var scene = S[id];
    document.getElementById('sceneRoot').innerHTML = scene.render();
    if(scene.bind){ scene.bind(); }
    window.scrollTo({top:0, behavior:'instant'});
  }

  goto('cover');

})();
</script>
